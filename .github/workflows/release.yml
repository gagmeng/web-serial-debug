name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    needs: create-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build:desktop

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  build-desktop:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: web-serial-debug-windows.exe
            asset_name: web-serial-debug-windows.zip
          - os: macos-latest
            artifact_name: web-serial-debug-macos
            asset_name: web-serial-debug-macos.zip
          - os: ubuntu-22.04
            artifact_name: web-serial-debug-linux
            asset_name: web-serial-debug-linux.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev build-essential

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.x'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: window/dist

      - name: Install dependencies
        run: yarn install

      - name: Generate app icon
        run: node scripts/build-icon.mjs

      - name: Compile Windows icon resource
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            'C:\msys64\mingw64\bin\windres.exe',
            'C:\Program Files\Git\mingw64\bin\windres.exe'
          )
          $windres = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $windres) {
            $windres = (Get-Command windres -ErrorAction SilentlyContinue)?.Source
          }
          if ($windres) {
            cd window
            & $windres -o rsrc_windows.syso resource.rc
            Write-Output "Icon resource compiled"
          } else {
            Write-Warning "windres not found, skipping icon"
          }

      - name: Build desktop app
        run: |
          cd window
          go build -v -ldflags "-X main.version=${{ github.event.inputs.version }}" -o ${{ matrix.artifact_name }}

      - name: Create release asset (Unix)
        if: runner.os != 'Windows'
        run: |
          cd window
          zip -r ../${{ matrix.asset_name }} ${{ matrix.artifact_name }} dist

      - name: Create release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd window
          Compress-Archive -Path @("${{ matrix.artifact_name }}", "dist") -DestinationPath "../${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}